name: Snap Schedule

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "The channel to snap"
        default: latest
        required: true
        type: choice
        options:
          - latest
          # - nightly
      no_version_consistency_check:
        description: "Skip version consistency check"
        default: false
        type: boolean
  # push:
  #   branches:
  #     - main
  schedule:
    # run every 8 hours at 10 minutes past the hour, there are 3 runs per day
    - cron: "10 */8 * * *"

jobs:
  snap:
    name: Invoke Snap
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { arch: universal, os: ubuntu-latest, is_core: true }
          - { arch: aarch64-unknown-linux, os: ubuntu-24.04-arm }
          - { arch: x86_64-unknown-linux, os: ubuntu-latest }
          - { arch: x86_64-pc-windows, os: windows-latest }
          - { arch: aarch64-apple-darwin, os: macos-latest }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Deployed
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: chawyehsu/moonbit-binaries
          ref: gh-pages
          path: ./tmp/dist

      - name: Snap Core
        if: ${{ matrix.is_core == true }}
        shell: pwsh
        run: ./snapV3.ps1 -Channel ${{ github.event.inputs.channel || 'latest' }} -NoVersionConsistencyCheck:$${{ github.event.inputs.no_version_consistency_check || 'false' }}

      - name: Upload Core
        if: ${{ matrix.is_core == true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-moonbit-core
          path: ./tmp/gha-artifacts/*

      - name: Snap Toolchain
        if: ${{ matrix.is_core != true }}
        shell: pwsh
        run: ./snapV3.ps1 -SnapToolchain -Channel ${{ github.event.inputs.channel || 'latest' }}

      - name: Upload Toolchain
        if: ${{ matrix.is_core != true }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: component-moonbit-toolchain-${{ matrix.arch }}
          path: ./tmp/gha-artifacts/*

  merge:
    needs: snap
    name: Deploy Index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Deployed
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: chawyehsu/moonbit-binaries
          ref: gh-pages
          path: ./tmp/dist

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./tmp/gha-artifacts
          pattern: component-*
          merge-multiple: true

      - name: Validate Artifacts
        id: validate_artifacts
        shell: pwsh
        run: |
          if (Test-Path -Path ./tmp/gha-artifacts) {
            $artifacts = Get-ChildItem -Path ./tmp/gha-artifacts -File
            Write-Host "Artifacts count: $($artifacts.Count)"
            if ($artifacts.Count -gt 0) {
              "SHOULD_MERGE=1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              return
            }
          }
          Write-Host "INFO: No artifacts found."

      - name: Merge Index
        id: merge_index
        if: ${{ steps.validate_artifacts.outputs.SHOULD_MERGE }}
        shell: pwsh
        run: ./snapV3.ps1 -Merge -Channel ${{ github.event.inputs.channel || 'latest' }} -NoVersionConsistencyCheck:$${{ github.event.inputs.no_version_consistency_check || 'false' }} && "SHOULD_DEPLOY=1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate Release Tag
        id: generate_tag
        if: ${{ steps.merge_index.outputs.SHOULD_DEPLOY }}
        shell: pwsh
        run: |
          $channels = (Get-Content -Path ./tmp/dist/v3/index.json -Raw | ConvertFrom-Json -AsHashtable).channels
          $tag = switch ('${{ github.event.inputs.channel || 'latest' }}') {
            'latest' {
              $version = $channels | Where-Object { $_.name -eq 'latest' } | Select-Object -ExpandProperty version -First 1
              "v$version"
            }
            'nightly' {
              $date = $channels | Where-Object { $_.name -eq 'nightly' } | Select-Object -ExpandProperty date -First 1
              "nightly-$date"
            }
          }
          # Remove component index json
          Remove-Item -Path ./tmp/gha-artifacts/*.json -Force
          Write-Host "Generated tag: $tag"
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: ${{ github.ref == 'refs/heads/main' && steps.generate_tag.outputs.TAG }}
        with:
          tag_name: ${{ steps.generate_tag.outputs.TAG }}
          body: "MoonBit release ${{ steps.generate_tag.outputs.TAG }} (channel: ${{ github.event.inputs.channel || 'latest' }}) was archived."
          files: |
            ./tmp/gha-artifacts/moonbit-*

      - name: Deploy Index
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        if: ${{ github.ref == 'refs/heads/main' && steps.generate_tag.outputs.TAG }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tmp/dist
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: update index
          keep_files: true

      - name: Cleanup
        if: always()
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          name: component-*
